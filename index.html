    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --blue: #1a73e8;
        --blue-dark: #1558b0;
        --text: #1a1a2e;
        --muted: #5f6368;
        --bg: #f8f9ff;
        --card: #ffffff;
        --border: #e8eaf6;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
      }

      /* NAV */
      nav {
        position: sticky;
        top: 0;
        background: rgba(248,249,255,0.92);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--border);
        padding: 14px 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        z-index: 100;
      }
      .nav-logo { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.5px; color: var(--blue); }
      .nav-cta {
        background: var(--blue);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 8px 18px;
        font-size: 0.88rem;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.15s;
      }
      .nav-cta:hover { background: var(--blue-dark); }

      /* HERO */
      .hero {
        text-align: center;
        padding: 80px 24px 72px;
        max-width: 740px;
        margin: 0 auto;
      }
      .hero-badge {
        display: inline-block;
        background: #e8f0fe;
        color: var(--blue);
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        padding: 5px 14px;
        border-radius: 100px;
        margin-bottom: 24px;
      }
      .hero h1 {
        font-size: clamp(2rem, 5vw, 3.2rem);
        font-weight: 800;
        letter-spacing: -1px;
        line-height: 1.15;
        margin-bottom: 20px;
        color: var(--text);
      }
      .hero h1 span { color: var(--blue); }
      .hero-sub {
        font-size: 1.1rem;
        color: var(--muted);
        max-width: 560px;
        margin: 0 auto 36px;
        line-height: 1.75;
      }
      .hero-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
      .btn-primary {
        background: var(--blue);
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 14px 28px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.15s, transform 0.1s;
      }
      .btn-primary:hover { background: var(--blue-dark); transform: translateY(-1px); }
      .btn-secondary {
        background: transparent;
        color: var(--blue);
        border: 2px solid var(--blue);
        border-radius: 10px;
        padding: 13px 28px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.15s;
      }
      .btn-secondary:hover { background: #e8f0fe; }

      /* SECTIONS */
      .section { padding: 72px 24px; max-width: 1040px; margin: 0 auto; }
      .section-label {
        text-align: center;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--blue);
        margin-bottom: 12px;
      }
      .section-title {
        text-align: center;
        font-size: clamp(1.5rem, 3vw, 2rem);
        font-weight: 800;
        letter-spacing: -0.5px;
        margin-bottom: 48px;
        color: var(--text);
      }

      /* FEATURES */
      .features-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
      }
      .feature-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 28px 24px;
        transition: box-shadow 0.2s;
      }
      .feature-card:hover { box-shadow: 0 8px 32px rgba(26,115,232,0.10); }
      .feature-icon { font-size: 1.8rem; margin-bottom: 14px; display: block; }
      .feature-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
      .feature-card p { font-size: 0.9rem; color: var(--muted); line-height: 1.6; }

      /* STEPS */
      .steps-section { background: #fff; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
      .steps-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 32px;
        counter-reset: steps;
      }
      .step { counter-increment: steps; position: relative; padding-top: 16px; }
      .step::before {
        content: counter(steps);
        display: flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--blue);
        color: #fff;
        font-weight: 800;
        font-size: 1rem;
        margin-bottom: 16px;
      }
      .step h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 8px; }
      .step p { font-size: 0.88rem; color: var(--muted); line-height: 1.65; }
      .step a { color: var(--blue); word-break: break-all; }
      .step a:hover { text-decoration: underline; }

      /* FOOTER */
      footer {
        text-align: center;
        padding: 40px 24px;
        font-size: 0.85rem;
        color: var(--muted);
        border-top: 1px solid var(--border);
      }
      footer a { color: var(--blue); text-decoration: none; }
      footer a:hover { text-decoration: underline; }

      @media (max-width: 520px) {
        nav { padding: 12px 16px; }
        .hero { padding: 52px 16px 48px; }
        .section { padding: 52px 16px; }
      }
    </style>
  </head>
  <body>
    <!-- NAV -->
    <nav>
      <span class="nav-logo">llama3pure</span>
      <a class="nav-cta" id="nav-cta" href="#how-it-works"></a>

    <!-- HERO -->
    <section class="hero">
      <div class="hero-badge" id="hero-badge"></div>
      <h1 id="hero-title">&nbsp;</h1>

      <div class="hero-actions">

    <!-- FEATURES -->
    <section class="section">

      <h2 class="section-title" id="feat-title">&nbsp;</h2>
      <div class="features-grid" id="features-grid"></div>

    <!-- STEPS -->
    <section class="steps-section">
      <div class="section" id="how-it-works">
        <p class="section-label" id="steps-label"></p>

    <script>

          steps: [
            {

            },

              desc: 'Descarga el modelo Gemma 3 1B de Google: <a href="https://huggingface.co/unsloth/gemma-3-1b-it-GGUF/resolve/main/gemma-3-1b-it-Q8_0.gguf?download=true">gemma-3-1b-it-Q8_0.gguf</a>',

          featLabel: "Why llama3pure",

          features: [
            {
              icon: "🔒",

              desc: 'Open the .htm file in your browser, click "Select GGUF file", choose the downloaded model, and start chatting!',

          ],
          footer:
            'llama3pure — <a href="https://github.com/lrusso/llama3pure" target="_blank" rel="noopener">GitHub</a> · Open source · By Leonardo Javier Russo',
        },
      }

      var lang = (window.navigator.language || "en").substring(0, 2).toLowerCase()
      var s = APP_STRINGS[lang] || APP_STRINGS["en"]

      function set(id, html) {
        var el = document.getElementById(id)
        if (el) {
          el.innerHTML = html
        }
      }

      set("nav-cta", s.navCta)
      set("hero-badge", s.heroBadge)
      set("hero-title", s.heroTitle)
      set("hero-sub", s.heroSub)
      set("hero-btn1", s.heroBtn1)
      set("hero-btn2", s.heroBtn2)
      set("feat-label", s.featLabel)
      set("feat-title", s.featTitle)
      set("steps-label", s.stepsLabel)
      set("steps-title", s.stepsTitle)
      set("footer-text", s.footer)

      var fg = document.getElementById("features-grid")
      s.features.forEach(function (f) {
        var card = document.createElement("div")
        card.className = "feature-card"
        card.innerHTML =
          '<span class="feature-icon">' +
          f.icon +
          "</span><h3>" +
          f.title +
          "</h3><p>" +
          f.desc +
          "</p>"
        fg.appendChild(card)
      })

      var sg = document.getElementById("steps-grid")
      s.steps.forEach(function (step) {
        var el = document.createElement("div")
        el.className = "step"
        el.innerHTML = "<h3>" + step.title + "</h3><p>" + step.desc + "</p>"
        sg.appendChild(el)
      })
    </script>
  </body>
